<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repo vs Repo — GitHub Repository Comparison | DemoVault</title>
  <meta name="description" content="Compare any two GitHub repositories side by side. Stars, forks, commits, releases, and more." />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://demovault.youngri.org/compare" />
  <meta property="og:title"       content="Repo vs Repo — GitHub Comparison | DemoVault" />
  <meta property="og:description" content="Compare any two GitHub repositories side by side." />

  <link rel="stylesheet" href="/style.css?v=20260327a" />
  <style>
    /* ===== Compare 도구 전용 스타일 ===== */
    .compare-hero {
      text-align: center;
      padding: 3rem 2rem 2rem;
      background: #1a1a2e;
      color: #fff;
    }
    .compare-hero h2 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
    .compare-hero p { color: rgba(255,255,255,0.6); font-size: 0.95rem; }

    .compare-form {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      max-width: 700px;
      margin: 2rem auto 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    .compare-form input {
      flex: 1;
      min-width: 180px;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .compare-form .vs-badge {
      font-weight: 800;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
      padding: 0.5rem;
    }
    .compare-form button {
      padding: 0.7rem 1.5rem;
      background: #fff;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .compare-form button:hover { background: #e9ecef; }
    .compare-form button:disabled { opacity: 0.5; cursor: not-allowed; }

    .compare-error {
      text-align: center;
      padding: 1rem;
      margin: 1rem auto;
      max-width: 500px;
      background: #f8d7da;
      color: #721c24;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .compare-error[hidden] { display: none; }

    /* 인기 비교 */
    .popular-section {
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 2rem;
    }
    .popular-section h3 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.75rem;
    }
    .popular-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.5rem;
    }
    .popular-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 6px;
      text-decoration: none;
      color: #1a1a2e;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
    }
    .popular-link:hover { background: #f8f9fa; border-color: #adb5bd; }

    /* 결과 영역 */
    #compare-result { padding: 2rem; max-width: 900px; margin: 0 auto; }
    #compare-result[hidden] { display: none; }

    .result-header { text-align: center; margin-bottom: 2rem; }
    .result-header h2 { font-size: 1.5rem; font-weight: 800; }
    .result-header p { font-size: 0.8rem; color: #888; }

    /* 레포 카드 2개 */
    .repo-cards {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      align-items: stretch;
    }
    @media (max-width: 640px) { .repo-cards { flex-direction: column; } }
    .repo-card {
      flex: 1;
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 8px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .repo-card-name {
      font-size: 1rem;
      font-weight: 700;
    }
    .repo-card-name a { color: inherit; text-decoration: none; }
    .repo-card-name a:hover { text-decoration: underline; }
    .repo-card-desc { font-size: 0.85rem; color: #555; line-height: 1.5; }
    .repo-card-stats { display: flex; gap: 1rem; font-size: 0.8rem; color: #888; }
    .repo-card-topics { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .topic-tag {
      font-size: 0.72rem;
      background: #e9ecef;
      color: #495057;
      padding: 0.15rem 0.55rem;
      border-radius: 20px;
    }
    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #ccc;
      padding: 0 0.5rem;
    }

    /* 비교 테이블 */
    .compare-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #e9ecef;
      margin-bottom: 2rem;
    }
    .compare-table th {
      background: #f8f9fa;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      text-align: center;
    }
    .compare-table th:first-child { text-align: left; }
    .compare-table td {
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
      text-align: center;
      border-bottom: 1px solid #f0f0f0;
    }
    .compare-table td:first-child {
      text-align: left;
      color: #555;
      font-size: 0.85rem;
    }
    .compare-table tr:last-child td { border-bottom: none; }
    .winner {
      background: #d4edda;
      color: #155724;
      font-weight: 600;
    }

    /* 차트 영역 */
    .chart-section { margin-bottom: 2rem; }
    .chart-section h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.75rem; }
    #commit-chart {
      width: 100%;
      height: 250px;
      background: #fff;
      border: 1px solid #e9ecef;
      border-radius: 8px;
    }

    /* 공유 */
    .share-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .share-bar span { font-size: 0.85rem; color: #888; }
    .share-btns { display: flex; gap: 0.5rem; }
    .share-btns button {
      padding: 0.4rem 1rem;
      border: 1px solid #e9ecef;
      border-radius: 4px;
      background: #fff;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .share-btns button:hover { background: #f8f9fa; }

    /* CTA */
    .cta-section {
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid #e9ecef;
    }
    .cta-section p { color: #888; font-size: 0.85rem; margin-bottom: 1rem; }
    .cta-btn {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      background: #1a1a2e;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }
    .cta-btn:hover { background: #2e2e5e; }

    /* 로딩 */
    .compare-loading {
      text-align: center;
      padding: 4rem 2rem;
    }
    .compare-loading[hidden] { display: none; }
  </style>
</head>
<body>
  <header>
    <h1><a href="/">DemoVault</a></h1>
    <nav>
      <a href="/compare" style="font-weight: 600;">Repo vs Repo</a>
      <a href="/submit" data-i18n="nav.submit">Submit Demo</a>
      <button id="lang-toggle" aria-label="Toggle language">KR / EN</button>
    </nav>
  </header>

  <!-- 히어로 + 입력 폼 -->
  <section class="compare-hero">
    <h2 data-i18n="compare.title">Repo vs Repo</h2>
    <p data-i18n="compare.subtitle">Compare any two GitHub repositories side by side</p>
    <form class="compare-form" id="compare-form">
      <input type="text" id="repo-a" placeholder="e.g., facebook/react" required />
      <span class="vs-badge">VS</span>
      <input type="text" id="repo-b" placeholder="e.g., vuejs/vue" required />
      <button type="submit" id="compare-btn" data-i18n="compare.cta">Compare</button>
    </form>
  </section>

  <!-- 에러 메시지 -->
  <div class="compare-error" id="compare-error" hidden></div>

  <!-- 로딩 -->
  <div class="compare-loading" id="compare-loading" hidden>
    <div class="spinner" style="margin: 0 auto 1rem;"></div>
    <p data-i18n="compare.loading">Fetching repository data...</p>
  </div>

  <!-- 인기 비교 (결과가 없을 때만 표시) -->
  <section class="popular-section" id="popular-section">
    <h3 data-i18n="compare.popular">Popular Comparisons</h3>
    <div class="popular-grid" id="popular-grid"></div>
  </section>

  <!-- 비교 결과 -->
  <section id="compare-result" hidden></section>

  <!-- 푸터 -->
  <footer class="site-footer">
    <p>
      <a href="https://clickvolt.app" target="_blank" rel="noopener">⚡ ClickVolt</a> — Check Before You Click
      &nbsp;|&nbsp;
      <a href="/">DemoVault</a> — Discover AI Demos
    </p>
    <p style="margin-top: 0.5rem; font-size: 0.78rem;">© 2026 DemoVault</p>
  </footer>

  <script src="/i18n.js?v=20260327a"></script>
  <script src="/compare.js?v=20260327a"></script>
</body>
</html>
