<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DemoVault — Admin</title>
  <link rel="stylesheet" href="style.css?v=20260324c" />
</head>
<body>
  <header>
    <h1><a href="index.html">DemoVault</a></h1>
    <nav>
      <span id="admin-email" style="color:#fff; font-size:0.85rem;"></span>
      <a href="https://krisakma.cloudflareaccess.com/cdn-cgi/access/logout" style="color:#fff; font-size:0.85rem; opacity:0.8;">로그아웃</a>
    </nav>
  </header>
  <main>
    <!-- 탭 -->
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="demos">📋 데모 관리</button>
      <button class="admin-tab"        data-tab="requests">💡 피처 리퀘스트</button>
    </div>

    <!-- 대시보드 통계 -->
    <div id="admin-stats" class="admin-stats">
      <div class="stat-card"><div class="stat-num" id="s-total">—</div><div class="stat-label">총 데모</div></div>
      <div class="stat-card"><div class="stat-num" id="s-today">—</div><div class="stat-label">오늘 등록</div></div>
      <div class="stat-card"><div class="stat-num" id="s-clicks">—</div><div class="stat-label">총 클릭</div></div>
      <div class="stat-card"><div class="stat-num" id="s-reviews">—</div><div class="stat-label">총 리뷰</div></div>
      <div class="stat-card"><div class="stat-num" id="s-feedback">—</div><div class="stat-label">총 피드백</div></div>
      <div class="stat-card"><div class="stat-num" id="s-requests">—</div><div class="stat-label">피처 리퀘스트</div></div>
    </div>

    <!-- 데모 탭 -->
    <div id="tab-demos">
    <div id="admin-section">
      <div id="state-loading" class="state-box">
        <div class="spinner"></div>
        <p>데모 목록 불러오는 중...</p>
      </div>
      <div id="state-error" class="state-box" hidden>
        <p class="state-icon">⚠️</p>
        <p id="error-msg">오류가 발생했습니다.</p>
      </div>
      <div id="demo-table-wrap" hidden>
        <table id="demo-table">
          <thead>
            <tr>
              <th>#</th>
              <th>이름</th>
              <th>카테고리</th>
              <th>등록일</th>
              <th>클릭</th>
              <th>리뷰</th>
              <th>상태</th>
              <th>작업</th>
            </tr>
          </thead>
          <tbody id="demo-tbody"></tbody>
        </table>
      </div>
    </div>
    </div><!-- /tab-demos -->

    <!-- 리퀘스트 탭 -->
    <div id="tab-requests" hidden>
      <div id="req-loading" class="state-box">
        <div class="spinner"></div>
        <p>불러오는 중...</p>
      </div>
      <div id="req-empty" class="state-box" hidden>
        <p class="state-icon">📭</p>
        <p>아직 피처 리퀘스트가 없습니다.</p>
      </div>
      <div id="req-list"></div>
    </div>
  </main>
  <!-- 수정 모달 -->
  <div id="edit-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <h2 class="modal-title">✏️ 데모 수정</h2>
      <label>이름</label>
      <input type="text" id="edit-name" />
      <label>카테고리</label>
      <select id="edit-category">
        <option value="image-gen">이미지 생성</option>
        <option value="text-ai">텍스트 AI</option>
        <option value="code-ai">코드 AI</option>
        <option value="voice-ai">음성 AI</option>
        <option value="video-ai">영상 AI</option>
        <option value="utility">유틸리티</option>
        <option value="other">기타</option>
      </select>
      <label>설명</label>
      <textarea id="edit-desc" rows="3"></textarea>
      <div class="modal-actions">
        <button id="edit-cancel">취소</button>
        <button id="edit-save">저장</button>
      </div>
    </div>
  </div>
  <script src="i18n.js?v=20260324c"></script>
  <script src="admin.js?v=20260324c"></script>
</body>
</html>
