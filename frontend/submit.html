<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DemoVault — Submit Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1><a href="index.html">DemoVault</a></h1>
    <button id="lang-toggle">KR / EN</button>
  </header>

  <main>
    <form id="submit-form">
      <h2 data-i18n="submit.title">Submit Your Demo</h2>

      <label for="name" data-i18n="submit.name">Project Name</label>
      <input type="text" id="name" name="name" required />

      <label for="url" data-i18n="submit.url">Demo URL</label>
      <input type="url" id="url" name="url" required placeholder="https://" />

      <label for="category" data-i18n="submit.category">Category</label>
      <select id="category" name="category" required>
        <option value="productivity" data-i18n="cat.productivity">Productivity</option>
        <option value="marketing"   data-i18n="cat.marketing">Marketing</option>
        <option value="ecommerce"   data-i18n="cat.ecommerce">E-Commerce</option>
        <option value="utility"     data-i18n="cat.utility">Utility</option>
        <option value="other"       data-i18n="cat.other">Other</option>
      </select>

      <label for="desc" data-i18n="submit.desc">Description</label>
      <textarea id="desc" name="desc" rows="4"></textarea>

      <button type="submit" data-i18n="submit.button">Submit &amp; Scan</button>
    </form>

    <div id="result" hidden></div>
  </main>

  <script src="i18n.js"></script>
  <script src="submit.js"></script>
</body>
</html>
