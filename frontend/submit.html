<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submit Your AI Demo — DemoVault</title>
  <meta name="description" content="Submit your AI demo to DemoVault. Every link is safety-checked with 3 tools before it goes live." />
  <meta property="og:title"       content="Submit Your AI Demo — DemoVault" />
  <meta property="og:description" content="Share your AI project with the world. Safety-checked, no account required." />
  <meta property="og:url"         content="https://demovault.youngri.org/submit" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1><a href="index.html">DemoVault</a></h1>
    <button id="lang-toggle">KR / EN</button>
  </header>

  <main>
    <form id="submit-form">
      <h2 data-i18n="submit.title">Submit Your Demo</h2>

      <label for="name" data-i18n="submit.name">Project Name</label>
      <input type="text" id="name" name="name" required />

      <label for="url" data-i18n="submit.url">Demo URL</label>
      <input type="url" id="url" name="url" required placeholder="https://" />

      <label for="category" data-i18n="submit.category">Category</label>
      <select id="category" name="category" required>
        <option value="image-gen"   data-i18n="cat.image-gen">Image Gen</option>
        <option value="text-ai"     data-i18n="cat.text-ai">Text AI</option>
        <option value="code-ai"     data-i18n="cat.code-ai">Code AI</option>
        <option value="voice-ai"    data-i18n="cat.voice-ai">Voice AI</option>
        <option value="video-ai"    data-i18n="cat.video-ai">Video AI</option>
        <option value="utility"     data-i18n="cat.utility">Utility</option>
        <option value="other"       data-i18n="cat.other">Other</option>
      </select>

      <label for="desc" data-i18n="submit.desc">Description</label>
      <textarea id="desc" name="desc" rows="4"></textarea>

      <button type="submit" data-i18n="submit.button">Submit &amp; Scan</button>
    </form>

    <div id="result" hidden></div>
  </main>

  <script src="i18n.js"></script>
  <script src="submit.js"></script>
</body>
</html>
