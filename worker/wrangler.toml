# ===== DemoVault — Cloudflare Worker 배포 설정 =====

name       = "demovault-worker"
main       = "index.js"
compatibility_date = "2024-01-01"

# ===== KV 네임스페이스 =====
# ⚠️ id와 preview_id는 아래 명령어로 생성 후 채워넣기:
#   wrangler kv:namespace create DEMOS
#   wrangler kv:namespace create DEMOS --preview
[[kv_namespaces]]
binding    = "DEMOS"        # worker 코드에서 env.DEMOS 로 접근
id         = "e499c031e193498f9933fbfceb8298dc"
preview_id = "93b91220d60f45ff99f3371d9e0555c1"

# ===== 프로덕션 환경변수 =====
# ⚠️ 실제 API 키는 여기 직접 쓰지 말고, 아래 명령어로 Secret으로 등록:
#   wrangler secret put GOOGLE_API_KEY
#   wrangler secret put URLSCAN_API_KEY
[vars]
ENVIRONMENT             = "production"
LEMONSQUEEZY_STORE_ID   = "278930"
LEMONSQUEEZY_VARIANT_PRO  = "1439828"
LEMONSQUEEZY_VARIANT_TEAM = "1439849"

# ===== 로컬 개발 전용 설정 (wrangler dev 실행 시 적용) =====
# .dev.vars 파일에 실제 키를 넣어두면 로컬에서만 사용됨 (gitignore 필수!)
# ===== Cron Triggers (자동 재스캔) =====
[triggers]
crons = ["0 3 * * sun"]  # 매주 일요일 03:00 UTC (한국시간 12:00)

[dev]
port            = 8787       # 로컬 서버 포트
local_protocol  = "http"
